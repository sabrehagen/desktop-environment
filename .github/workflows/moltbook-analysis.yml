name: Moltbook Twitter Analysis
on:
  push:
    paths:
      - moltbook-twitter-analysis/**
  workflow_dispatch:
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install matplotlib numpy

      - name: Generate graphs
        run: python3 moltbook-twitter-analysis/analyze.py

      - name: Upload graphs artifact
        uses: actions/upload-artifact@v4
        with:
          name: moltbook-graphs
          path: moltbook-twitter-analysis/output/
