name: Build Desktop Environment
on: [push, workflow_call]
jobs:
  select-runner:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      runner: ${{ steps.select.outputs.runner }}
    steps:
      - name: Check for online self-hosted runners
        id: select
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_RUNNER_CHECK_TOKEN != '' && secrets.ACTIONS_RUNNER_CHECK_TOKEN || github.token }}
        run: |
          set +e
          ONLINE=$(gh api repos/${{ github.repository }}/actions/runners --jq '[.runners[] | select(.status == "online")] | length' 2>&1)
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -ne 0 ] || [ -z "$ONLINE" ] || ! echo "$ONLINE" | grep -qE '^[0-9]+$'; then
            echo "Could not query runners (exit=$EXIT_CODE), defaulting to ubuntu-latest"
            ONLINE=0
          fi
          if [ "$ONLINE" -gt 0 ]; then
            echo "Found $ONLINE online self-hosted runner(s)"
            echo "runner=self-hosted" >> $GITHUB_OUTPUT
          else
            echo "No self-hosted runners available, using ubuntu-latest"
            echo "runner=ubuntu-latest" >> $GITHUB_OUTPUT
          fi

  build:
    needs: select-runner
    runs-on: ${{ needs.select-runner.outputs.runner }}
    permissions:
      actions: read
      packages: write
    steps:

      - name: Record workflow start time
        run: echo "TIME_WORKFLOW_START=$(date +%s)" >> $GITHUB_ENV

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx (self-hosted)
        if: needs.select-runner.outputs.runner == 'self-hosted'
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Set up Docker Buildx (GitHub-hosted)
        if: needs.select-runner.outputs.runner != 'self-hosted'
        uses: docker/setup-buildx-action@v3

      - name: Sanitise repository owner
        run: echo REPOSITORY_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]') >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.REPOSITORY_OWNER }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Export build args from environment configuration
        id: build-args
        env:
          DESKTOP_ENVIRONMENT_USER: ${{ env.REPOSITORY_OWNER }}
          DESKTOP_ENVIRONMENT_GITHUB_USER: ${{ env.REPOSITORY_OWNER }}
        run: bash .github/scripts/export-build-args.sh

      - name: Record build start
        run: echo "TIME_BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Build (self-hosted)
        if: needs.select-runner.outputs.runner == 'self-hosted'
        id: build-self-hosted
        uses: docker/build-push-action@v6
        with:
          build-args: ${{ steps.build-args.outputs.build_args }}
          cache-from: type=registry,ref=ghcr.io/${{ env.REPOSITORY_OWNER }}/desktop-environment:latest
          file: docker/Dockerfile
          push: false
          tags: ghcr.io/${{ env.REPOSITORY_OWNER }}/desktop-environment:latest

      - name: Build (GitHub-hosted)
        if: needs.select-runner.outputs.runner != 'self-hosted'
        id: build-github-hosted
        uses: docker/build-push-action@v6
        with:
          build-args: ${{ steps.build-args.outputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          file: docker/Dockerfile
          load: true
          push: false
          tags: ghcr.io/${{ env.REPOSITORY_OWNER }}/desktop-environment:latest

      - name: Record build end
        if: always()
        run: echo "TIME_BUILD_END=$(date +%s)" >> $GITHUB_ENV

      - name: Record push start
        run: echo "TIME_PUSH_START=$(date +%s)" >> $GITHUB_ENV

      - name: Push to GitHub Container Registry
        id: push
        run: docker push ghcr.io/${{ env.REPOSITORY_OWNER }}/desktop-environment:latest

      - name: Record push end
        if: always()
        run: echo "TIME_PUSH_END=$(date +%s)" >> $GITHUB_ENV

      - name: Run desktop environment tests
        id: test
        run: ./docker/scripts/test.sh
        env:
          DESKTOP_ENVIRONMENT_REGISTRY: ghcr.io/${{ env.REPOSITORY_OWNER }}
        continue-on-error: true

      - name: Generate workflow summary
        if: always()
        env:
          STEP_BUILD_OUTCOME: ${{ steps.build-self-hosted.outcome || steps.build-github-hosted.outcome }}
          STEP_PUSH_OUTCOME: ${{ steps.push.outcome }}
          STEP_TEST_OUTCOME: ${{ steps.test.outcome }}
          JOB_STATUS: ${{ job.status }}
        run: bash .github/scripts/generate-summary.sh
