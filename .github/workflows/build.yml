name: Build Desktop Environment
on: [push, workflow_call]
jobs:
  build:
    runs-on: self-hosted
    permissions:
      actions: read
      packages: write
    steps:

      - name: Record workflow start time
        run: echo "TIME_WORKFLOW_START=$(date +%s)" >> $GITHUB_ENV

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sanitise repository owner
        run: echo REPOSITORY_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]') >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.REPOSITORY_OWNER }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Record build start
        run: echo "TIME_BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Build
        id: build
        env:
          DESKTOP_ENVIRONMENT_CONTAINER_TAG: latest
          DESKTOP_ENVIRONMENT_GITHUB_USER: ${{ env.REPOSITORY_OWNER }}
          DESKTOP_ENVIRONMENT_HOST_USER_PASSWORD: ${{ env.REPOSITORY_OWNER }}
          DESKTOP_ENVIRONMENT_REGISTRY: ghcr.io/${{ env.REPOSITORY_OWNER }}
          DESKTOP_ENVIRONMENT_USER: ${{ env.REPOSITORY_OWNER }}
        run: |
          ./docker/scripts/build.sh \
            --cache-from type=registry,ref=ghcr.io/${{ env.REPOSITORY_OWNER }}/desktop-environment:latest \
            --progress=plain 2>&1 | tee /tmp/build.log

      - name: Record build end
        if: always()
        run: echo "TIME_BUILD_END=$(date +%s)" >> $GITHUB_ENV

      - name: Parse build step timings
        if: always()
        run: .github/scripts/parse-build-timings.sh /tmp/build.log docker/Dockerfile > /tmp/build-timings.tsv

      - name: Record push start
        run: echo "TIME_PUSH_START=$(date +%s)" >> $GITHUB_ENV

      - name: Push to GitHub Container Registry
        id: push
        env:
          DESKTOP_ENVIRONMENT_CONTAINER_TAG: latest
          DESKTOP_ENVIRONMENT_GITHUB_USER: ${{ env.REPOSITORY_OWNER }}
          DESKTOP_ENVIRONMENT_REGISTRY: ghcr.io/${{ env.REPOSITORY_OWNER }}
          DESKTOP_ENVIRONMENT_USER: ${{ env.REPOSITORY_OWNER }}
        run: ./docker/scripts/push.sh

      - name: Record push end
        if: always()
        run: echo "TIME_PUSH_END=$(date +%s)" >> $GITHUB_ENV

      - name: Run desktop environment tests
        id: test
        run: ./docker/scripts/test.sh
        env:
          DESKTOP_ENVIRONMENT_REGISTRY: ghcr.io/${{ env.REPOSITORY_OWNER }}
          DESKTOP_ENVIRONMENT_X_HEADLESS: 1
        continue-on-error: true

      - name: Generate workflow summary
        if: always()
        env:
          STEP_BUILD_OUTCOME: ${{ steps.build.outcome }}
          STEP_PUSH_OUTCOME: ${{ steps.push.outcome }}
          STEP_TEST_OUTCOME: ${{ steps.test.outcome }}
          JOB_STATUS: ${{ job.status }}
        run: .github/scripts/generate-summary.sh
